<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Contacto y soporte de la app de running." />
  <title>Contacto · AtletismoShop</title>
</head>

<body>
  <div class="page">
    <header class="header">
      <div class="header__inner">
        <a class="brand" href="./index.html" aria-label="Ir a inicio">
          <span class="brand__mark" aria-hidden="true"></span>
          <span class="brand__text">
            <span class="brand__name">AtletismoShop</span>
            <span class="brand__tag">Soporte</span>
          </span>
        </a>

        <nav class="nav" aria-label="Navegación principal">
          <a class="nav__link" href="./index.html">Inicio</a>
          <a class="nav__link" href="./products.html">Productos</a>
          <a class="nav__link" href="./cart.html">Carrito <span class="badge" data-cart-badge>0</span></a>
          <span class="nav__link" style="padding:10px 12px;">❤ <span class="badge" data-fav-badge>0</span></span>
          <a class="nav__link nav__link--active" href="./contact.html">Contacto</a>
          <button class="theme-btn" type="button" data-theme-toggle aria-label="Cambiar tema">Tema</button>
        </nav>
      </div>
    </header>

    <main class="main">
      <div class="main__inner">
        <div class="breadcrumbs">
          <a class="breadcrumbs__link" href="./index.html">Inicio</a>
          <span class="breadcrumbs__sep">›</span>
          <span class="breadcrumbs__current">Contacto</span>
        </div>

        <section class="section">
          <div class="section__head">
            <div>
              <h1 class="section__title">Soporte</h1>
              <p class="section__hint">Sugerencias, incidencias y newsletter (simulado).</p>
            </div>
          </div>

          <form class="form" data-contact-form aria-label="Formulario de contacto">
            <div class="form__row">
              <div class="form__field">
                <label class="form__label" for="name">Nombre</label>
                <input class="input" id="name" name="name" type="text" placeholder="Tu nombre" required />
              </div>

              <div class="form__field">
                <label class="form__label" for="email">Email</label>
                <input class="input" id="email" name="email" type="email" placeholder="tucorreo@email.com" required />
              </div>
            </div>

            <div class="form__field">
              <label class="form__label" for="msg">Mensaje</label>
              <textarea class="input textarea" id="msg" name="msg" placeholder="¿Qué te gustaría mejorar?" required></textarea>
            </div>

            <button class="btn btn--primary" type="submit">Enviar</button>
          </form>

          <form class="form" data-newsletter-form aria-label="Newsletter">
            <div class="form__field">
              <label class="form__label" for="nl">Newsletter</label>
              <input class="input" id="nl" type="email" placeholder="Email para recibir novedades" required />
            </div>
            <button class="btn btn--ghost" type="submit">Suscribirme</button>
          </form>
        </section>
      </div>
    </main>

    <footer class="footer">
      <div class="footer__inner">
        <span>© 2026 AtletismoShop</span>
        <span class="footer__muted">Soporte</span>
      </div>
    </footer>
  </div>

  <div class="toast" data-toast aria-live="polite"></div>

  <script type="module" src="./src/js/main.js"></script>
</body>
</html>
