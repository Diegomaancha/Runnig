<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Listado de productos de running con filtros, favoritos y carrito visual." />
  <title>Productos · AtletismoShop</title>
  <!-- ✅ Cargar estilos ANTES de pintar el body (evita FOUC) -->
  <link rel="stylesheet" href="/src/scss/main.scss">
</head>

<body>
  <div class="page">
    <header class="header">
      <div class="header__inner">
        <a class="brand" href="./index.html" aria-label="Ir a inicio">
          <span class="brand__mark" aria-hidden="true"></span>
          <span class="brand__text">

          </span>
        </a>

        <nav class="nav container">

          <div class="nav__brand">
            <img class="logo" src="./Images/images.png" alt="AtletismoShop logo">
            <strong>AtletismoShop</strong>
          </div>

          <div class="nav__menu">
            <a class="nav__link" href="index.html">Inicio</a>
            <a class="nav__link" href="products.html">Productos</a>
            <a class="nav__link" href="contact.html">Contacto</a>
          </div>

          <div class="nav__actions">

            <a class="cart-btn" href="cart.html">
              Carrito <span class="badge">0</span>
            </a>

            <div class="theme-toggle">
              <input class="theme-toggle__checkbox" type="checkbox" id="theme-toggle">
              <label for="theme-toggle">Tema</label>
            </div>

          </div>

        </nav>

    </header>

    <main class="main">
      <div class="main__inner">

        <div class="breadcrumbs">
          <a class="breadcrumbs__link" href="./index.html">Inicio</a>
          <span class="breadcrumbs__sep">›</span>
          <span class="breadcrumbs__current">Productos</span>
        </div>

        <section class="section">
          <div class="section__head">
            <div>
              <h1 class="section__title">Catálogo</h1>
              <p class="section__hint">Busca, filtra, guarda favoritos y añade al carrito.</p>
            </div>
          </div>

          <div class="filters" aria-label="Filtros del catálogo">
            <div class="filters__group">
              <label class="filters__label" for="q">Buscar</label>
              <input class="input" id="q" type="search" placeholder="Zapatillas, reloj, cinturón..." data-filter-q />
            </div>

            <div class="filters__group">
              <label class="filters__label" for="cat">Categoría</label>
              <select class="select" id="cat" data-filter-cat>
                <option value="all">Todas</option>
                <option value="zapatillas">Zapatillas</option>
                <option value="ropa">Ropa</option>
                <option value="tecnologia">Tecnología</option>
                <option value="accesorios">Accesorios</option>
              </select>
            </div>

            <div class="filters__group">
              <label class="filters__label" for="sort">Orden</label>
              <select class="select" id="sort" data-filter-sort>
                <option value="featured">Destacados</option>
                <option value="price-asc">Precio ↑</option>
                <option value="price-desc">Precio ↓</option>
                <option value="name-asc">Nombre A–Z</option>
              </select>
            </div>

            <label class="check" for="favs">
              <input class="check__box" id="favs" type="checkbox" data-filter-favs />
              Solo favoritos
            </label>
          </div>

          <div class="grid grid--products" data-products-grid></div>
        </section>

      </div>
    </main>

    <footer class="footer">
      <div class="footer__inner">
        <span>© 2026 AtletismoShop</span>
        <span class="footer__muted">Running store</span>
      </div>
    </footer>
  </div>

  <div class="toast" data-toast aria-live="polite"></div>

  <script type="module" src="./src/js/main.js"></script>
</body>

</html>
